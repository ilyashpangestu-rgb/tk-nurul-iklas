<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreatif - Papan Gambar Ajaib</title>
    <style>
        :root {
            --purple: #A66CFF;
            --pink: #FF85A1;
            --yellow: #FFD93D;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            background: #fef1fb;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 15px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-home {
            text-decoration: none;
            background: var(--purple);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
        }

        /* AREA KANVAS */
        canvas {
            background: white;
            border: 8px solid var(--purple);
            border-radius: 30px;
            margin: 20px 0;
            cursor: crosshair;
            touch-action: none; /* Biar enak di HP/Tablet */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* TOOLBAR BAWAH */
        .toolbar {
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            position: fixed;
            bottom: 20px;
        }

        .tool {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 3px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: 0.2s;
        }

        .tool:hover { transform: scale(1.2); }
        .active { border-color: var(--purple); background: #f0e6ff; }

        .btn-action {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .clear { background: #ff5e5e; }
        .save { background: #2ecc71; }

        input[type="color"] {
            border: none;
            width: 50px;
            height: 50px;
            cursor: pointer;
            background: none;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-home">⬅ Kembali</a>
        <h1 style="margin: 0; font-size: 1.5rem; color: var(--purple);">🎨 Papan Lukis Ajaib</h1>
        <div style="width: 100px;"></div>
    </header>

    <canvas id="canvas"></canvas>

    <div class="toolbar">
        <!-- Pilih Warna -->
        <input type="color" id="colorPicker" value="#A66CFF">
        
        <!-- Ukuran Kuas -->
        <select id="brushSize" style="padding: 10px; border-radius: 10px; border: 2px solid #eee;">
            <option value="5">Kecil</option>
            <option value="15" selected>Sedang</option>
            <option value="30">Besar</option>
        </select>

        <!-- Efek Pelangi -->
        <div class="tool" id="rainbowBtn" title="Kuas Pelangi" onclick="toggleRainbow()">🌈</div>

        <!-- Tombol Hapus & Simpan -->
        <button class="btn-action clear" onclick="clearCanvas()">🗑️ Hapus</button>
        <button class="btn-action save" onclick="saveCanvas()">⭐ Simpan</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        
        // Ukuran kanvas otomatis
        canvas.width = window.innerWidth * 0.9;
        canvas.height = window.innerHeight * 0.65;

        let drawing = false;
        let rainbowMode = false;
        let hue = 0;

        function start(e) {
            drawing = true;
            draw(e);
        }

        function end() {
            drawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!drawing) return;

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = brushSize.value;

            if (rainbowMode) {
                ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
                hue = (hue + 5) % 360;
            } else {
                ctx.strokeStyle = colorPicker.value;
            }

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function toggleRainbow() {
            rainbowMode = !rainbowMode;
            document.getElementById('rainbowBtn').classList.toggle('active');
        }

        function clearCanvas() {
            if(confirm("Hapus semua gambar?")) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        function saveCanvas() {
            const link = document.createElement('a');
            link.download = 'lukisan-hebatku.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Mouse & Touch Listeners
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mouseup', end);
        canvas.addEventListener('mousemove', draw);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
        canvas.addEventListener('touchend', end);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    </script>
</body>
</html>
